<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT - MEHER FERCHICHI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- STYLE DE BASE & STRUCTURE (Identique à vos autres pages) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #000b18; color: #fff; line-height: 1.6; overflow-x: hidden; }

        /* --- BANNIÈRE --- */
        .grande-photo-banner {
            width: 100%; height: 350px;
            background: #001f3f url('image profil.png') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            position: relative; text-align: center;
        }
        .grande-photo-banner::after { 
            content: ""; position: absolute; inset: 0; background: rgba(0, 31, 63, 0.75); 
        }
        .banner-content { position: relative; z-index: 2; color: white; padding: 0 20px; }
        .main-name { font-family: 'Playfair Display', serif; font-size: 3rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .journalist-line { font-size: 1.2rem; color: #00d1ff; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; }

        /* --- NAVIGATION --- */
        nav { 
            background: #1a1a1a; padding: 20px; text-align: center; position: sticky; 
            top: 0; z-index: 1000; border-bottom: 2px solid #00d1ff; 
        }
        nav a { color: rgba(255, 255, 255, 0.6); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        nav a.active { color: #00d1ff; border-bottom: 2px solid #00d1ff; padding-bottom: 5px; }
        nav a:hover { color: #00d1ff; }

        /* --- ESPACE CONTACT FUTURISTE --- */
        .contact-wrapper { max-width: 850px; margin: 60px auto; padding: 0 20px; animation: fadeIn 1.2s ease-out; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .contact-header { text-align: center; margin-bottom: 45px; }
        .contact-header h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }
        .contact-header p { color: #00d1ff; text-transform: uppercase; letter-spacing: 3px; font-size: 0.8rem; font-weight: 700; }

        /* CHAMPS DE SAISIE */
        .input-group { position: relative; margin-bottom: 40px; }
        
        .input-group input, .input-group textarea {
            width: 100%; background: transparent; border: none;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding: 12px 0; color: #fff; font-size: 1.1rem;
            transition: 0.4s; font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        .input-group label {
            position: absolute; top: 12px; left: 0;
            color: rgba(255,255,255,0.4); pointer-events: none;
            transition: 0.4s; text-transform: uppercase; font-size: 0.75rem; font-weight: 700;
        }

        /* Animation quand on écrit dans les cases */
        .input-group input:focus ~ label,
        .input-group input:not(:placeholder-shown) ~ label,
        .input-group textarea:focus ~ label,
        .input-group textarea:not(:placeholder-shown) ~ label {
            top: -20px; font-size: 0.7rem; color: #00d1ff;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-bottom: 2px solid #00d1ff;
        }

        textarea { min-height: 120px; resize: none; }

        /* BOUTON D'ENVOI */
        .btn-container { text-align: center; }
        
        .futuristic-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #00d1ff;
            padding: 18px 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
        }

        .futuristic-btn:hover {
            background: #00d1ff;
            color: #000;
            box-shadow: 0 0 30px rgba(0, 209, 255, 0.5);
            transform: translateY(-3px);
        }

        /* RESPONSIVE */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .main-name { font-size: 2rem; }
            nav { overflow-x: auto; white-space: nowrap; display: flex; padding: 15px 10px; }
            nav a { font-size: 0.7rem; margin: 0 8px; flex-shrink: 0; }
            .glass-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <header class="grande-photo-banner">
        <div class="banner-content">
            <h1 class="main-name">Meher Ferchichi</h1>
            <p class="journalist-line">Direct Connectivity</p>
        </div>
    </header>

    <nav>
        <a href="index.html">HOME</a>
        <a href="categorie-a.html">BIOGRAPHY</a>
        <a href="categorie-b.html">CERTIFICATES</a>
        <a href="categorie-c.html">ALBUM</a>
        <a href="categorie-d.html">AUDIO PRODUCTION</a>
        <a href="categorie-e.html">VIDEO PRODUCTION</a>
        <a href="categorie-f.html">AI VIDEO PRODUCTION</a>
        <a href="categorie-g.html" class="active">CONTACT</a>
    </nav>

    <main class="contact-wrapper">
        <div class="glass-card">
            <div class="contact-header">
                <p>Establishing Connection</p>
                <h2>Message Hub</h2>
            </div>

            <div class="input-group">
                <input type="text" id="userSubject" placeholder=" " required>
                <label>Objet / Subject</label>
            </div>

            <div class="input-group">
                <textarea id="userMessage" placeholder=" " required></textarea>
                <label>Votre Message / Content</label>
            </div>

            <div class="btn-container">
                <a href="#" id="sendMailBtn" class="futuristic-btn">
                    Initialize Transfer
                </a>
            </div>
        </div>
    </main>

    <script>
        const sendBtn = document.getElementById('sendMailBtn');
        const subjectField = document.getElementById('userSubject');
        const messageField = document.getElementById('userMessage');
        const myEmail = "meher.radio.tun@gmail.com";

        sendBtn.addEventListener('click', function(e) {
            const subject = encodeURIComponent(subjectField.value);
            const body = encodeURIComponent(messageField.value);

            // Vérification si les champs sont vides
            if (subjectField.value.trim() === "" || messageField.value.trim() === "") {
                e.preventDefault();
                alert("Veuillez remplir l'objet et le message avant l'envoi.");
            } else {
                // Construction du lien mailto dynamique
                sendBtn.href = `mailto:${myEmail}?subject=${subject}&body=${body}`;
            }
        });
    </script>

</body>
</html>
