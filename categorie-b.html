    <meta charset="UTF-8">

    <title>CERTIFICATS - MEHER FERCHICHI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; }

        /* --- BANDEAU PHOTO --- */
        .grande-photo-banner {
            width: 100%; height: 300px;
            background-image: url('image-profil.png');
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 80px 40px rgba(255, 255, 255, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        /* --- NAVIGATION --- */
        nav { background-color: #333; padding: 15px; text-align: center; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        nav a:hover { color: #00d1ff; }

        /* --- CONTENEUR PRINCIPAL --- */
        .main-container { max-width: 1250px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; }

        /* --- GRILLE : FORCE 4 PAR LIGNE --- */
        .grid-certifs { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); /* FORCE LES 4 COLONNES */
            gap: 20px; 
            margin-top: 30px; 
        }
        
        /* Adaptation pour mobile (si l'écran est trop petit pour 4) */
        @media (max-width: 1000px) { .grid-certifs { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { .grid-certifs { grid-template-columns: 1fr; } }

        .cert-card {
            position: relative; height: 180px; background: #00122e; border-radius: 8px;
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;
        }
        .cert-card img { width: 100%; height: 100%; object-fit: cover; }

        /* EFFET SURVOL (OVERLAY) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.9); color: white;
            display: flex; align-items: center; justify-content: center; text-align: center;
            padding: 15px; opacity: 0; transition: 0.4s ease; transform: translateY(100%);
            font-size: 0.9rem;
        }
        .cert-card:hover .overlay { opacity: 1; transform: translateY(0); }

        /* --- SYSTÈME DE ZOOM (MODALE) --- */
        #zoneZoom {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            display: flex; background: white; max-width: 1000px; width: 100%; 
            max-height: 85vh; border-radius: 10px; overflow: hidden;
        }
        .modal-img-side { flex: 1.2; background: #111; display: flex; align-items: center; justify-content: center; }
        .modal-img-side img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .modal-text-side { flex: 1; padding: 30px; overflow-y: auto; }

        @media (max-width: 800px) { .modal-box { flex-direction: column; } }
    </style>
</head>
