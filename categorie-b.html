        /* --- BANDEAU PHOTO --- */
        .grande-photo-banner {
            width: 100%; height: 400px;
            background: #001f3f url('image profil.png') center/cover no-repeat;
            display: flex; align-items: center; justify-content: center;
            position: relative;

        .grande-photo-banner h1 {
            position: relative; z-index: 2; font-size: 3.5rem; color: white;

        }
