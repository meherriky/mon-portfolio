<section style="padding: 40px; background: #ffffff; max-width: 1200px; margin: auto;">
    
    <header style="border-bottom: 3px solid #003366; padding-bottom: 20px; margin-bottom: 40px;">
        <h2 style="color: #003366; font-size: 2.5rem; margin: 0; font-weight: 800;">Certifications & Accreditations</h2>
        <p style="color: #006400; font-size: 1.1rem; font-weight: 600; margin-top: 5px;">International expertise in Media Governance and Digital Innovation</p>
    </header>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px;">
        
        <div class="cert-card" onclick="ouvrirZoom('Benevolat ONU.jpeg', 'ONU UIT CERTEFICAT - 2005 ', ' My journey in digital media began at the 2005 World Summit on the Information Society (WSIS). Serving as a Web Editor for the official Arabic website, I gained my first deep-dive experience into digital storytelling and real-time reporting under the auspices of the International Telecommunication Union (ITU). This foundational role sparked my passion for using digital platforms to bridge the gap between complex information and global audiences.')" style="position: relative; height: 200px; background: #00122e; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;">
            <img src="Benevolat ONU.jpeg" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 51, 102, 0.9); color: white; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 0; transition: 0.4s ease; transform: translateY(100%);">
                <p><strong>ASBU Academy</strong><br>Click to expand</p>
            </div>
        </div>

        <div class="cert-card" onclick="ouvrirZoom('Benevolat ONU.jpeg', 'EBU Academy', 'Description complète : Digital Transformation strategy...')" style="position: relative; height: 200px; background: #00122e; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer;">
            <img src="certif-ebu.jpg" style="width: 100%; height: 100%; object-fit: cover;">
            <div class="overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 51, 102, 0.9); color: white; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 0; transition: 0.4s ease; transform: translateY(100%);">
                <p><strong>EBU Academy</strong><br>Click to expand</p>
            </div>
        </div>

        </div>

    <div id="zoneZoom" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; padding:20px;">
        <span onclick="fermerZoom()" style="position:absolute; top:20px; right:30px; color:white; font-size:40px; cursor:pointer;">&times;</span>
        
        <div style="display:flex; background:white; max-width:1100px; width:100%; max-height:90vh; border-radius:10px; overflow:hidden;">
            <div style="flex:1; background:#111; display:flex; align-items:center; justify-content:center; padding:10px;">
                <img id="imgZoom" src="" style="max-width:100%; max-height:80vh; object-fit:contain;">
            </div>
            <div style="flex:1; padding:30px; color:#333; overflow-y:auto;">
                <h2 id="titreZoom" style="color:#003366;"></h2>
                <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
                <p id="texteZoom" style="font-size:1.1rem; line-height:1.6;"></p>
                <button onclick="fermerZoom()" style="margin-top:20px; padding:10px 20px; background:#CC0000; color:white; border:none; border-radius:5px; cursor:pointer;">Close</button>
            </div>
        </div>
    </div>

    <style>
        .cert-card:hover .overlay { opacity: 1 !important; transform: translateY(0) !important; }
    </style>

    <script>
        function ouvrirZoom(source, titre, texte) {
            document.getElementById('zoneZoom').style.display = "flex";
            document.getElementById('imgZoom').src = source;
            document.getElementById('titreZoom').innerText = titre;
            document.getElementById('texteZoom').innerText = texte;
        }
        function fermerZoom() {
            document.getElementById('zoneZoom').style.display = "none";
        }
    </script>

</section>
